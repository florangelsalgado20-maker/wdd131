<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Temple Album - A collection of beautiful photographs from temples around the world showcasing sacred architecture and design">
    <meta name="author" content="Florangel Salgado">
    <title>Temple Album</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- CSS Files - Mobile First -->
    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">
    
    <!-- JavaScript -->
    <script src="scripts/temples.js" defer></script>
</head>
<body>
    <header>
        <h2>Temple Album</h2>
        <nav id="nav-menu">
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#old">Old</a></li>
                <li><a href="#new">New</a></li>
                <li><a href="#large">Large</a></li>
                <li><a href="#small">Small</a></li>
            </ul>
        </nav>
        <button id="hamburger-menu" aria-label="Toggle navigation menu">
            <span>&#9776;</span>
        </button>
    </header>

    <main>
        <h1>Home</h1>
        
        <div class="temple-grid">
            <figure>
                <img src="images/san-diego-temple.jpg" alt="San Diego California Temple" loading="lazy">
                <figcaption>San Diego California</figcaption>
            </figure>
            
            <figure>
                <img src="images/salt-lake-temple.jpg" alt="Salt Lake Temple" loading="lazy">
                <figcaption>Salt Lake Utah</figcaption>
            </figure>
            
            <figure>
                <img src="images/los-angeles-temple.jpg" alt="Los Angeles California Temple" loading="lazy">
                <figcaption>Los Angeles California</figcaption>
            </figure>
            
            <figure>
                <img src="images/manila-temple.jpg" alt="Manila Philippines Temple" loading="lazy">
                <figcaption>Manila Philippines</figcaption>
            </figure>
            
            <figure>
                <img src="images/guatemala-temple.jpg" alt="Guatemala City Temple" loading="lazy">
                <figcaption>Guatemala City Guatemala</figcaption>
            </figure>
            
            <figure>
                <img src="images/panama-temple.jpg" alt="Panama City Temple" loading="lazy">
                <figcaption>Panama City Panama</figcaption>
            </figure>
            
            <figure>
                <img src="images/lima-temple.jpg" alt="Lima Peru Temple" loading="lazy">
                <figcaption>Lima Peru</figcaption>
            </figure>
            
            <figure>
                <img src="images/mexico-city-temple.jpg" alt="Mexico City Temple" loading="lazy">
                <figcaption>Mexico City Mexico</figcaption>
            </figure>
            
            <figure>
                <img src="images/brasilia-temple.jpg" alt="Brasilia Brazil Temple" loading="lazy">
                <figcaption>Brasilia Brazil</figcaption>
            </figure>
        </div>
    </main>

    <footer>
        <p>&copy;<span id="current-year"></span> Florangel Salgado</p>
        <p>Last Modification: <span id="last-modified"></span></p>
    </footer>
</body>
</html>
